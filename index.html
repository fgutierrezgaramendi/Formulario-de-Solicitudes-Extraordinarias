<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solicitud de Insumos Extraordinarios — Farmacias Chávez</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:12px;color:#111;background:#f5f7fa}
.wrap{max-width:820px;margin:0 auto;padding:20px}
.btn-bar{display:flex;gap:8px;margin-bottom:16px}
.btn-bar button{padding:8px 20px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;font-family:Arial}
.btn-print{background:#0c2340;color:#fff}
.btn-export{background:#166534;color:#fff}
.btn-add{background:#1e40af;color:#fff}
.btn-reset{background:#e5e7eb;color:#374151}
.btn-enviar{background:#b45309;color:#fff;font-size:13px;padding:8px 24px;border:2px solid #92400e}
.btn-enviar:hover{background:#92400e}
.btn-enviar:disabled{background:#9ca3af;border-color:#9ca3af;cursor:not-allowed}

/* HEADER */
.doc-hdr{background:#fff;border:1px solid #e2e8f0;border-top:4px solid #0c2340;padding:16px 20px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.doc-hdr-left{display:flex;align-items:center;gap:14px}
.doc-hdr-logo{height:32px;width:auto;border-radius:4px;display:block}
.doc-hdr h1{font-size:16px;color:#0c2340;margin-bottom:3px}
.doc-hdr .sub{font-size:10px;color:#666}
.doc-codes{text-align:right;font-size:10px;color:#555;line-height:1.8}

/* DATOS GENERALES */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:5px;margin-bottom:12px;overflow:hidden}
.card-hdr{background:#0c2340;color:#fff;padding:8px 14px;font-size:11px;font-weight:700;letter-spacing:.4px;display:flex;justify-content:space-between;align-items:center}
.card-body{padding:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:7px 9px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;font-family:Arial;width:100%}
.fg input:focus,.fg select:focus{outline:none;border-color:#0c2340}
.req{color:#dc2626}

/* SUCURSAL BLOCK */
.suc-block{background:#fff;border:1px solid #bfdbfe;border-left:4px solid #1e40af;border-radius:5px;margin-bottom:10px;overflow:hidden}
.suc-block-hdr{background:#eff6ff;padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
.suc-block-hdr .suc-label{font-weight:700;color:#1e3a5f;font-size:12px}
.suc-block-hdr .suc-cod{font-family:monospace;font-size:10px;color:#3b82f6;background:#dbeafe;padding:2px 8px;border-radius:3px;margin-left:8px}
.suc-block-body{padding:12px 14px}
.suc-meta{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:10px}

/* ITEMS TABLE */
.items-wrap{border:1px solid #e5e7eb;border-radius:4px;overflow:hidden}
.items-hdr{display:grid;grid-template-columns:80px 1fr 70px 100px 32px;gap:0;background:#f3f4f6}
.items-hdr span{padding:6px 8px;font-size:10px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.3px;border-right:1px solid #e5e7eb}
.items-hdr span:last-child{border:none;text-align:center}
.item-row{display:grid;grid-template-columns:80px 1fr 70px 100px 32px;gap:0;border-top:1px solid #f0f0f0;align-items:center}
.item-row:hover{background:#fafafa}
.item-row > *{padding:5px 8px;border-right:1px solid #f0f0f0}
.item-row > *:last-child{border:none;display:flex;justify-content:center}
.item-cod{font-family:monospace;font-size:10.5px;color:#1e40af;font-weight:600}
.item-select{font-size:11.5px;padding:4px 6px;border:none;background:transparent;width:100%;font-family:Arial;cursor:pointer;color:#111}
.item-select:focus{outline:none;background:#fff}
.item-um{font-size:11px;color:#6b7280;text-align:center}
.item-qty{width:80px;padding:4px 8px;border:1px solid #d1d5db;border-radius:3px;text-align:center;font-size:12px;font-family:Arial;font-weight:700}
.item-qty:focus{outline:none;border-color:#1e40af}
.btn-del-item{width:26px;height:26px;border:none;background:#fee2e2;color:#dc2626;border-radius:4px;cursor:pointer;font-size:14px;line-height:1}
.btn-add-item{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;border:1px dashed #93c5fd;background:#f0f9ff;color:#1e40af;cursor:pointer;font-size:11.5px;font-family:Arial;width:100%;border-top:1px solid #e5e7eb}
.btn-add-item:hover{background:#dbeafe}
.btn-del-suc{padding:4px 10px;border:1px solid #fca5a5;background:#fff;color:#dc2626;border-radius:4px;cursor:pointer;font-size:11px;font-family:Arial}

/* TOTAL STRIP */
.total-strip{background:#0c2340;color:#fff;padding:8px 14px;display:flex;justify-content:flex-end;align-items:center;gap:20px;font-size:12px}
.total-strip strong{font-size:15px}

@media print{
  body{background:#fff}
  .btn-bar,.btn-add-item,.btn-del-item,.btn-del-suc{display:none!important}
  .wrap{padding:8px}
  .suc-block{break-inside:avoid}
  .item-select{border:none}
  @page{size:A4;margin:10mm}
}
</style>
</head>

function sucOpts(sel) {
  var o = function(s){
    return '<option value="'+s.cod+'" data-suc="'+s.suc+'"'+(sel===s.suc?' selected':'')+'>'+s.suc+'</option>';

  return '<option value="">Selecciona sucursal u oficina...</option>' +
    '<optgroup label="Sucursales">' + SUCURSALES.map(o).join('') + '</optgroup>' +
    '<optgroup label="Oficinas / Áreas">' + OFICINAS.map(o).join('') + '</optgroup>';
}

      '<div class="items-wrap">'+
        '<div class="items-hdr">'+
          '<span>Cód. Interno</span><span>Insumo</span><span style="text-align:center">U.M.</span>'+
          '<span style="text-align:center">Cantidad Solicitada</span><span></span>'+
        '</div>'+
        '<div id="items-'+sid+'"></div>'+
        '<button class="btn-add-item" onclick="addItem(\''+sid+'\')">+ Agregar insumo</button>'+
      '</div>'+
    '</div>';
  document.getElementById('suc-list').appendChild(div);
  addItem(sid); addItem(sid); addItem(sid);
  updateGrandTotal();
}

function removeSuc(sid) {
  var el = document.getElementById(sid);
  if (el) { el.remove(); updateGrandTotal(); }
}

function onSucChange(sel, sid) {
  var cod = sel.value;
  var lbl = document.getElementById('lbl-cod-'+sid);
  if (lbl) lbl.textContent = cod || '—';
}

// ── ITEM ROW ───────────────────────────────────────────────────────────────────
function catOpts() {
  return '<option value="">— Selecciona insumo —</option>' +
    CATALOGO.map(function(c){
      return '<option value="'+c.cod+'" data-um="'+c.um+'">'+c.nombre+'</option>';
    }).join('');
}

function addItem(sid) {
  _itemCount++;
  var iid = 'item-'+_itemCount;
  var row = document.createElement('div');
  row.className = 'item-row'; row.id = iid;
  row.innerHTML =
    '<div class="item-cod" id="icod-'+iid+'">—</div>'+
    '<div style="padding:4px 6px">'+
      '<select class="item-select" onchange="onInsChange(this,\''+iid+'\')">'+catOpts()+'</select>'+
    '</div>'+
    '<div class="item-um" id="ium-'+iid+'">—</div>'+
    '<div style="text-align:center">'+
      '<input class="item-qty" type="number" min="1" placeholder="0" id="iqty-'+iid+'" oninput="updateGrandTotal()">'+
    '</div>'+
    '<div>'+
      '<button class="btn-del-item" onclick="removeItem(\''+iid+'\')" title="Quitar">✕</button>'+
    '</div>';
  document.getElementById('items-'+sid).appendChild(row);
}

function removeItem(iid) {
  var el = document.getElementById(iid);
  if (el) { el.remove(); updateGrandTotal(); }
}

function onInsChange(sel, iid) {
  var opt = sel.options[sel.selectedIndex];
  var cod = opt.value || '—';
  var um  = opt.getAttribute('data-um') || '—';
  var codEl = document.getElementById('icod-'+iid);
  var umEl  = document.getElementById('ium-'+iid);
  if (codEl) codEl.textContent = cod;
  if (umEl)  umEl.textContent  = um;
  updateGrandTotal();
}

function updateGrandTotal() {
  var total = 0;
  document.querySelectorAll('.item-qty').forEach(function(el){
    total += parseInt(el.value)||0;
  });
  document.getElementById('grand-total').textContent = total;
}

// ── COLLECT DATA ───────────────────────────────────────────────────────────────
function getData() {
  var secs = document.querySelectorAll('.suc-block');
  var result = [];
  secs.forEach(function(sec) {
    var sid = sec.id;
    var sel = document.getElementById('sel-'+sid);
    if (!sel || !sel.value) return;
    var sucNombre = sel.options[sel.selectedIndex].text;
    var cod = sel.value;
    var items = [];
    sec.querySelectorAll('.item-row').forEach(function(row) {
      var iid = row.id;
      var selIns = row.querySelector('.item-select');
      var qty = document.getElementById('iqty-'+iid);
      if (!selIns || !qty) return;
      var opt = selIns.options[selIns.selectedIndex];
      if (!opt || !opt.value) return;
      var q = parseInt(qty.value)||0;
      if (q <= 0) return;
      items.push({
        cod: opt.value,
        nombre: opt.text,
        um: opt.getAttribute('data-um')||'',
        cantidad: q
      });
    });
    if (items.length > 0)
      result.push({cod:cod, sucursal:sucNombre, items:items});
  });
  return result;
}

// ── EXPORTAR CSV ───────────────────────────────────────────────────────────────
function exportarCSV() {
  var data = getData();
  if (!data.length) { alert('Agrega al menos una sucursal con insumos'); return; }
  var elaborador = document.getElementById('g-elaborador').value||'';
  var fecha = document.getElementById('g-fecha').value||'';
  var motivo = document.getElementById('g-motivo').value;

  var csv = 'SOLICITUD DE INSUMOS EXTRAORDINARIOS\n';
  csv += '"Elaborado por:","'+elaborador+'"\n';
  csv += '"Fecha:","'+fecha+'"\n';
  csv += '"Motivo:","'+motivo+'"\n\n';
  csv += 'SUCURSAL,CODIGO PDV,COD. INTERNO,INSUMO,U.M.,CANTIDAD SOLICITADA\n';

  data.forEach(function(s) {
    s.items.forEach(function(it) {
      csv += '"'+s.sucursal+'","'+s.cod+'","'+it.cod+'","'+it.nombre+'","'+it.um+'",'+it.cantidad+'\n';
    });
  });

  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Solicitud_Extraordinaria_'+fecha.replace(/-/g,'')+'.csv';
  a.click();
}

// ── CONFIGURACIÓN APPS SCRIPT ──────────────────────────────────────────────────
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZg9krGeS-UV6cv3L7b_upe2R2mRCxrRuhv4J0xrKgpymMbL3vqGoUtQCphdPfc7rNIg/exec';

// ── MOSTRAR ESTADO DE ENVÍO ────────────────────────────────────────────────────
function setStatus(tipo, msg) {
  var el = document.getElementById('send-status');
  var colores = {
    ok:   {bg:'#dcfce7', color:'#166534', border:'#86efac'},
    err:  {bg:'#fee2e2', color:'#991b1b', border:'#fca5a5'},
    load: {bg:'#fef3c7', color:'#92400e', border:'#fcd34d'}
  };
  var c = colores[tipo] || colores.load;
  el.style.display  = msg ? '' : 'none';
  el.style.background   = c.bg;
  el.style.color        = c.color;
  el.style.border       = '1.5px solid ' + c.border;
  el.textContent = msg || '';
}

// ── ENVIAR SOLICITUD AL APPS SCRIPT ───────────────────────────────────────────
function enviarSolicitud() {
  // Validar campos generales
  var elaborador = (document.getElementById('g-elaborador').value || '').trim();
  var fecha      = (document.getElementById('g-fecha').value      || '').trim();
  var motivo     =  document.getElementById('g-motivo').value;
  var obsGen     = (document.getElementById('g-obs').value        || '').trim();

  if (!elaborador) { setStatus('err', '⚠️ Completa el campo "Elaborado por"'); return; }
  if (!fecha)      { setStatus('err', '⚠️ Selecciona la fecha'); return; }

  // Recolectar datos (reutiliza getData())
  var data = getData();
  if (!data.length) {
    setStatus('err', '⚠️ Agrega al menos una sucursal con insumos y cantidad mayor a 0');
    return;
  }

  // Construir filas — una por insumo por sucursal
  var filas = [];
  data.forEach(function(suc) {
    suc.items.forEach(function(item) {
      filas.push({
        fecha:         fecha,
        solicitante:   elaborador,
        sucursal:      suc.sucursal,
        descripcion:   item.nombre,
        sku:           item.cod,
        cantidad:      item.cantidad,
        motivo:        motivo,
        obsGeneral:    obsGen || '',
        obsParticular: ''
      });
    });
  });

  // Bloquear botón
  var btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  btn.textContent = '⏳ Enviando...';
  setStatus('load', '⏳ Enviando ' + filas.length + ' fila(s) a Google Sheets...');

  // Enviar en serie
  var enviados = 0;
  var errores  = [];

  function enviarSig(idx) {
    if (idx >= filas.length) {
      btn.disabled    = false;
      btn.textContent = '📤 Enviar Solicitud';
      if (errores.length === 0) {
        setStatus('ok',
          '✅ ' + enviados + ' solicitud(es) enviada(s) correctamente. ' +
          'Quedan PENDIENTES hasta que el responsable las apruebe en Google Sheets.');
        // Limpiar formulario tras 3 segundos
        setTimeout(function() {
          setStatus('', '');
          resetForm();
        }, 4000);
      } else {
        setStatus('err',
          '⚠️ ' + enviados + ' enviadas, ' + errores.length +
          ' con error. Intenta nuevamente.');
      }
      return;
    }

    fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      mode:    'no-cors',  // Apps Script no devuelve CORS — la fila igual se guarda
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify(filas[idx])
    })
    .then(function() {
      enviados++;
      setStatus('load', '⏳ Enviando... (' + (idx + 1) + '/' + filas.length + ')');
      enviarSig(idx + 1);
    })
    .catch(function(e) {
      errores.push('Fila ' + (idx + 1));
      enviarSig(idx + 1);
    });
  }

  enviarSig(0);
}

// ── RESET ──────────────────────────────────────────────────────────────────────
function resetForm() {
  if (!confirm('¿Limpiar todo el formulario?')) return;
  document.getElementById('suc-list').innerHTML = '';
  document.getElementById('g-elaborador').value = '';
  document.getElementById('g-obs').value = '';
  _sucCount = 0; _itemCount = 0;
  updateGrandTotal();
  addSucursal();
}
